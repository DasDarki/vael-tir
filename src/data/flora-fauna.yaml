    habitat: Gärten, Feldränder
    bloom: Frühjahr bis Herbst
    harvest: Blütenköpfe während der Blüte
    appearance: Orange bis gelbe Blüten, klebriger Stängel
    effects:
      - DIE Wundheilpflanze
      - Gegen Entzündungen, Ekzeme
      - Für Salben und Cremes
      - Essbare Blüten (Dekoration)
    cost: 3 Kupfer (Salbe)
    tags: [heilend, kultiviert]

