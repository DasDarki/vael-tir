# Kompendium der Flora & Fauna Vael Tirs
# Quellen: Flora & Fauna.md, Calythar.md, Esh'Raen.md, Varkuun.md

meta:
  description: >
    Digitalisiertes Kompendium der bekannten Flora und Fauna Vael Tirs.
    Regionen sind grobe Landstriche (wie in der Quelle), Orte sind konkrete
    Siedlungen oder Landmarken, an denen die Art vorkommt oder bekannt ist.

  # Für die Filter-Sidebar – Reihenfolge definiert Gruppierung
  types:
    flora:
      - heilpflanze
      - giftpflanze
      - pilz
      - baum
      - gewuerz
      - blume
      - nutzpflanze
      - obst
    fauna:
      - reittier
      - hund
      - nutztier
      - raubtier
      - beutetier
      - vogel
      - meerestier
      - insekt
      - saeugetier
      - reptil
      - amphibie

  typeLabels:
    heilpflanze: Heilpflanze
    giftpflanze: Giftpflanze
    pilz: Pilz
    baum: Baum
    gewuerz: Gewürz
    blume: Blume
    nutzpflanze: Nutzpflanze / Getreide
    obst: Obst & Gemüse
    reittier: Reittier
    hund: Hund
    nutztier: Nutztier
    raubtier: Raubtier
    beutetier: Beutetier
    vogel: Vogel
    meerestier: Meerestier
    insekt: Insekt / Wirbelloses
    saeugetier: Säugetier
    reptil: Reptil
    amphibie: Amphibie

  # Kontinente → Regionen → konkrete Orte
  # Reihenfolge wird in der UI übernommen.
  geography:
    - continent: Calythar
      regions:
        - name: Varethianische Ebenen
          locations: [Varethis, Helioris, Selhaven, Mordrath, Keldrin, Velastum, Molthen, Arendal, Birketh, Damrath, Horathen, Luminfluss, Spiegelsee]
        - name: Westen & Westebenen
          locations: [Thesan-Hafen, Calyra, Velenthor, Saltheris, Ankhoral, Ernath, Langeth, Neveth, Soramund, Vaelith, Odiannisches Meer]
        - name: Süden
          locations: [Soranthis, Lumendras, Veranthal, Rebendris, Mulbeth, Havelthen, Dorathel, Althenor]
        - name: Calythische Höhen
          locations: [Fendrak, Korvash, Sildareth, Tharumund, Gorendal, Stumprath, Nordath, Haldorn, Felsmahr, Vindrath, Korathel, Tiefenthal]
        - name: Valdorn
          locations: [Bekannter Rand, Graue Tiefe, Vaelgrund, Schrein von Moldrath, Stille Lichtung, Valendris, Wanderpfad, Haldorn]
        - name: Ordensmarken
          locations: [Karsuun, Sturmarak, Nevelthas, Langer Wall, Grenthas, Veltharak, Grathmund, Vendarath, Khorendal, Vaelstrom, Großer Riss]
    - continent: Varkuun
      regions:
        - name: Nordvarkuun
          locations: [Valdrek, Bran Keth, Kethmund, Branthor, Sturmkap, Grauklamm, Vendrath]
        - name: Zentralvarkuun (Aschezonen)
          locations: [Zirkelinsel, Loryn-Ruinen, Aschholm, Thalendris]
        - name: Südvarkuun
          locations: [Solveth, Tränenhaven, Thalmunds Rast, Kalveth]
    - continent: Esh'Raen
      regions:
        - name: Jenseits des Nebels
          locations: [Kosmisches Gebirge, Il'Sereth]

entries:

  # ─── Kräuter & Heilpflanzen: Allgemein verbreitet ─────────────────────
  - name: Mondblatt
    scientificName: Lunaria pallens
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Süden, Valdorn]
    locations: [Varethis, Selhaven, Molthen, Soranthis, Bekannter Rand, Haldorn]
    continents: [Calythar]
    habitat: Schattige Waldränder, feuchte Wiesen
    bloom: Frühjahr (3.–5. Monat)
    harvest: Blätter im Frühjahr, Wurzeln im Herbst
    appearance: Silbrig-grüne Blätter mit weißer Unterseite, kleine weiße Blüten
    effects:
      - Beruhigend, schlaffördernd
      - Als Tee gegen Schlaflosigkeit und Angstzustände
      - Äußerlich als Umschlag gegen leichte Verbrennungen
    tags: [heilend]

  - name: Königsfarn
    scientificName: Filix regalis
    category: flora
    type: heilpflanze
    regions: [Valdorn, Calythische Höhen]
    locations: [Vaelgrund, Bekannter Rand, Haldorn, Felsmahr]
    continents: [Calythar]
    habitat: Feuchte Waldböden, Bachläufe
    harvest: Ganzjährig (Wedel), Frühjahr (junge Triebe)
    appearance: Große gefiederte Wedel, bis zu 1,5m hoch, goldbraune Sporen
    effects:
      - Blutstillend
      - Junge Triebe essbar und nahrhaft
      - Wurzelextrakt gegen Würmer und Parasiten
    tags: [heilend, essbar]

  - name: Bitterdistel
    scientificName: Carduus amarus
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Westen & Westebenen, Süden, Ordensmarken]
    locations: [Varethis, Thesan-Hafen, Soramund, Vaelith, Grathmund]
    continents: [Calythar]
    habitat: Brachland, Wegränder, Ruinen
    bloom: Sommer (6.–8. Monat)
    harvest: Blüten im Sommer, Wurzeln im Herbst
    appearance: Stachelige Blätter, purpurne Blütenköpfe
    effects:
      - Fiebersenkend
      - Verdauungsfördernd (sehr bitter)
      - Leberstärkend nach Vergiftungen
    tags: [heilend, bitter]

  - name: Weißwurz
    scientificName: Radix alba
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Süden]
    locations: [Varethis, Selhaven, Velastum, Soranthis, Veranthal]
    continents: [Calythar]
    habitat: Trockene Wiesen, Feldränder
    harvest: Herbst (Wurzeln)
    appearance: Unscheinbare Pflanze mit kleinen gelben Blüten, weiße knollige Wurzel
    effects:
      - Entzündungshemmend
      - Gegen Gelenkschmerzen und Rheuma
      - Als Wickel gegen Schwellungen
    tags: [heilend]

  - name: Lavendel
    scientificName: Lavandula serena
    category: flora
    type: heilpflanze
    regions: [Süden, Westen & Westebenen]
    locations: [Soranthis, Lumendras, Veranthal, Thesan-Hafen, Calyra, Helioris]
    continents: [Calythar]
    habitat: Sonnige, trockene Hänge, Gärten
    bloom: Frühsommer bis Spätsommer (6.–8. Monat)
    harvest: Blüten kurz vor dem vollständigen Öffnen
    appearance: Silbrig-grüne Blätter, violette Blütenähren, intensiver Duft
    effects:
      - Beruhigend, angstlösend
      - Gegen Kopfschmerzen und Migräne
      - Lavendelöl für Parfüm und Heilzwecke
      - Getrocknete Blüten gegen Schlaflosigkeit
      - Antiseptisch bei kleinen Wunden
      - Mottenschutz in Kleiderschränken
    cost: 3 Kupfer (getrocknet), 1 Silber (Öl)
    tags: [heilend, duft, kultiviert]

  - name: Kamille
    scientificName: Matricaria pacifica
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Westen & Westebenen, Süden, Calythische Höhen, Ordensmarken]
    locations: [Varethis, Selhaven, Molthen, Arendal, Soranthis, Thesan-Hafen, Haldorn]
    continents: [Calythar]
    habitat: Feldränder, Wiesen, Wegränder
    bloom: Spätes Frühjahr bis Herbst
    harvest: Blütenköpfe im Sommer
    appearance: Kleine weiße Blüten mit gelbem Zentrum, apfelähnlicher Duft
    effects:
      - Das "Allheilmittel der Armen"
      - Beruhigend, krampflösend
      - Gegen Magenbeschwerden und Blähungen
      - Äußerlich entzündungshemmend
      - Augenbäder bei Bindehautentzündung
    cost: 2 Kupfer (Tee)
    tags: [heilend, alltäglich]

  - name: Pfefferminze
    scientificName: Mentha piperita
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Westen & Westebenen, Süden, Calythische Höhen]
    locations: [Varethis, Selhaven, Luminfluss, Molthen, Soranthis, Thesan-Hafen]
    continents: [Calythar]
    habitat: Bachläufe, feuchte Gärten
    harvest: Blätter vor der Blüte (Frühsommer)
    appearance: Gezahnte, dunkelgrüne Blätter, intensiver Geruch
    effects:
      - Verdauungsfördernd
      - Gegen Kopfschmerzen (Stirn einreiben)
      - Erfrischend, belebend
      - Atemverbessernd
    cost: 8 Kupfer (Öl)
    tags: [heilend]

  - name: Salbei
    scientificName: Salvia officinalis
    category: flora
    type: heilpflanze
    regions: [Süden, Varethianische Ebenen]
    locations: [Soranthis, Veranthal, Lumendras, Varethis, Helioris]
    continents: [Calythar]
    habitat: Trockene, sonnige Standorte
    bloom: Frühsommer
    harvest: Blätter vor der Blüte
    appearance: Graugrüne, samtweiche Blätter, blauviolette Blüten
    effects:
      - Antiseptisch, antibakteriell
      - Gegen Halsschmerzen (Gurgeln)
      - Schweißhemmend
      - Kulinarisch – Fleischgerichte
      - Räucherwerk zur Reinigung
    cost: 3 Kupfer pro Bündel
    tags: [heilend, kulinarisch, kultiviert]

  - name: Rosmarin
    scientificName: Rosmarinus memoriae
    category: flora
    type: heilpflanze
    regions: [Süden, Westen & Westebenen]
    locations: [Soranthis, Lumendras, Thesan-Hafen, Calyra, Velenthor]
    continents: [Calythar]
    habitat: Trockene, felsige Hänge
    bloom: Frühjahr
    harvest: Ganzjährig (immergrün)
    appearance: Nadelförmige dunkelgrüne Blätter, hellblaue Blüten
    effects:
      - Gedächtnisstärkend ("Kraut der Erinnerung")
      - Durchblutungsfördernd
      - Kulinarisch – Fleisch, Brot
      - Bei Beerdigungen als Symbol der Erinnerung
    cost: 4 Kupfer pro Bündel
    tags: [heilend, kulinarisch, rituell]

  - name: Brennnessel
    scientificName: Urtica fortis
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Westen & Westebenen, Süden, Calythische Höhen, Valdorn, Ordensmarken]
    locations: [Varethis, Selhaven, Thesan-Hafen, Soranthis, Haldorn, Karsuun]
    continents: [Calythar]
    habitat: Nährstoffreiche Böden, Ruinen, Waldränder
    harvest: Frühjahr (junge Triebe), Sommer (Blätter), Herbst (Samen)
    appearance: Gezahnte Blätter mit Brennhaaren
    effects:
      - Blutreinigend, entgiftend
      - Reich an Eisen (gegen Blutarmut)
      - Junge Triebe essbar (wie Spinat)
      - Fasern für Stoff
      - Samen als Stärkungsmittel
    tags: [heilend, essbar, alltäglich]

  - name: Thymian
    scientificName: Thymus vulgaris
    category: flora
    type: heilpflanze
    regions: [Süden, Westen & Westebenen]
    locations: [Soranthis, Veranthal, Lumendras, Thesan-Hafen, Helioris]
    continents: [Calythar]
    habitat: Trockene, sonnige Standorte
    bloom: Frühsommer
    harvest: Vor und während der Blüte
    appearance: Kleine ovale Blätter, rosa bis violette Blüten
    effects:
      - Antiseptisch, schleimlösend
      - Gegen Husten und Bronchitis
      - Kulinarisch universal einsetzbar
      - Konservierend für Fleisch
    cost: 2 Kupfer pro Bündel
    tags: [heilend, kulinarisch]

  - name: Schafgarbe
    scientificName: Achillea militaris
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Ordensmarken, Westen & Westebenen, Süden]
    locations: [Karsuun, Sturmarak, Grathmund, Mordrath, Varethis]
    continents: [Calythar]
    habitat: Wiesen, Wegränder, trockene Standorte
    bloom: Sommer
    harvest: Blühendes Kraut im Sommer
    appearance: Fein gefiederte Blätter, weiße oder rosa Doldenblüten
    effects:
    - Soldatenkraut
      – stillt Blutungen
      - Fiebersenkend
      - Gegen Menstruationsbeschwerden
      - Verdauungsfördernd
    tags: [heilend, militärisch]

  - name: Johanniskraut
    scientificName: Hypericum solaris
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Westen & Westebenen, Süden, Calythische Höhen]
    locations: [Varethis, Helioris, Soranthis, Thesan-Hafen, Ernath]
    continents: [Calythar]
    habitat: Wiesen, Waldlichtungen
    bloom: Hochsommer (um die Sommersonnenwende)
    harvest: Blühende Triebspitzen
    appearance: Gelbe sternförmige Blüten, beim Zerreiben rotes Öl
    effects:
      - Stimmungsaufhellend ("Sonnenkraut")
      - Gegen leichte Depressionen
      - Öl für Wundheilung und Nervenschmerzen
    warning: Macht lichtempfindlich!
    tags: [heilend, magisch-assoziiert]

  - name: Baldrian
    scientificName: Valeriana somnifera
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Süden, Valdorn]
    locations: [Luminfluss, Selhaven, Lumendras, Bekannter Rand, Mulbeth]
    continents: [Calythar]
    habitat: Bachläufe, feuchte Wiesen
    harvest: Wurzeln im Herbst (2. Jahr)
    appearance: Rosa-weiße Doldenblüten, charakteristischer Geruch der Wurzel
    effects:
      - Stark beruhigend, schlaffördernd
      - Gegen Angstzustände
      - Krampflösend
      - Für Katzen anziehend
    cost: 5 Kupfer (Tropfen)
    tags: [heilend]

  - name: Holunder
    scientificName: Sambucus protector
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Westen & Westebenen, Süden, Calythische Höhen]
    locations: [Varethis, Molthen, Arendal, Thesan-Hafen, Soranthis, Haldorn]
    continents: [Calythar]
    habitat: Waldränder, Hecken, nahe Siedlungen
    bloom: Spätes Frühjahr (Blüten), Spätsommer (Beeren)
    harvest: Blüten im Frühjahr, Beeren im Herbst
    appearance: Strauch oder kleiner Baum, weiße Doldenblüten, schwarze Beeren
    effects:
      - Blüten schweißtreibend, gegen Erkältungen
      - Beeren reich an Vitaminen, Sirup gegen Husten
      - Traditionell Schutzpflanze gegen böse Geister
    warning: Rinde und Blätter roh GIFTIG!
    cost: 3 Kupfer (Beersirup)
    tags: [heilend, rituell]

  - name: Arnika
    scientificName: Arnica montana
    category: flora
    type: heilpflanze
    regions: [Calythische Höhen]
    locations: [Fendrak, Sildareth, Korathel, Vindrath, Sturmarak]
    continents: [Calythar]
    habitat: Alpine Wiesen, karge Böden
    bloom: Hochsommer
    harvest: Blüten im Sommer
    appearance: Gelb-orange Blüten, aromatischer Geruch
    effects:
      - Gegen Prellungen, Verstauchungen, Blutergüsse
      - Gegen Muskelkater
      - Fördert Durchblutung
    warning: Nur äußerlich – innerlich giftig!
    cost: 1 Silber (Salbe)
    tags: [heilend, alpin]

  - name: Wermut
    scientificName: Artemisia amara
    category: flora
    type: heilpflanze
    regions: [Ordensmarken, Varethianische Ebenen]
    locations: [Karsuun, Mordrath, Grathmund, Khorendal]
    continents: [Calythar]
    habitat: Ödland, Wegränder
    harvest: Blühendes Kraut im Sommer
    appearance: Silbrig-grüne, fein zerteilte Blätter, sehr bitter
    effects:
      - Extrem bitter – "König der Bitterkeit"
      - Verdauungsfördernd, gegen Würmer
      - Gegen Appetitlosigkeit
      - Basis für Absinth
      - Mottenschutz
    warning: Gefährlich bei Überdosierung
    tags: [heilend, bitter, rauschmittel]

  - name: Ringelblume
    scientificName: Calendula sanans
    category: flora
    type: heilpflanze
    regions: [Varethianische Ebenen, Westen & Westebenen, Süden]
    locations: [Varethis, Helioris, Soranthis, Veranthal, Thesan-Hafen]
